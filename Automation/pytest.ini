
[pytest]

pythonpath=.

addopts =
    -v
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --clean-alluredir
    --reruns 3
    --reruns-delay 5

testpaths = tests

python_files = test_*.py

python_classes = Test*

python_functions = test_*

markers =
    ui: UI tests
    api: API tests
    e2e: End-to-end tests
